[tasks.sync]
run = "uv sync --all-packages --all-groups"

[tasks.install]
run = "uv tool install ."

[tasks.upgrade]
run = "uv tool install --reinstall ."

[tasks.fmt]
run = "uv run ruff format . && uv run ruff check --fix ."

[tasks.lint]
run = "uv run ruff check ."

[tasks.test]
run = "uv run pytest tests/unit"

[tasks."test:integration"]
run = "uv run pytest -s -vv tests/integration"

[tasks."test:integration-full"]
run = "uv run pytest -s -vv tests/integration-full"

[tasks."test:all"]
run = "uv run pytest tests"

[tasks.typecheck]
run = "uv run ty check"

[tasks.auth]
run = "uv run ib auth login"
